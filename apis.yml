apis:
  - aid: suprsend:rest-api
    name: SuprSend REST API
    description: >-
      The SuprSend REST API allows developers to programmatically trigger notification
      workflows, manage users and subscribers, send broadcast notifications, and access
      delivery logs. Authentication uses workspace key and secret credentials. The API
      returns HTTP 202 on successful workflow triggers and supports up to 100 recipients
      per single workflow trigger call.
    humanURL: https://docs.suprsend.com/reference/overview
    baseURL: https://hub.suprsend.com
    tags:
      - Notifications
      - Workflows
      - Multi-Channel
      - REST
    properties:
      - type: Documentation
        url: https://docs.suprsend.com/reference/overview
      - type: PostmanCollection
        url: https://docs.suprsend.com/docs/developer/overview
      - type: OpenAPI
        url: openapi/suprsend-rest-api-openapi.yml
  - aid: suprsend:management-api
    name: SuprSend Management API
    description: >-
      The SuprSend Management API provides programmatic control over workspace assets
      including workflows, templates, and other SuprSend configuration resources.
      It uses service tokens for authentication rather than workspace keys, and
      enables CI/CD integration for deploying notification configurations.
    humanURL: https://docs.suprsend.com/docs/developer/overview
    baseURL: https://hub.suprsend.com
    tags:
      - Management
      - Workflows
      - Templates
      - Configuration
    properties:
      - type: Documentation
        url: https://docs.suprsend.com/docs/developer/overview
