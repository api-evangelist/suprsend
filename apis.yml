aid: suprsend
name: SuprSend
description: >-
  SuprSend is a notification infrastructure platform that enables engineering teams to build,
  manage, and scale multi-channel notifications through a single unified API. It supports
  delivery across email, SMS, push notifications, in-app inbox, WhatsApp, Slack, and
  Microsoft Teams without requiring separate integrations for each channel. The platform
  provides workflow orchestration, template management, user preference management, smart
  channel routing with vendor fallback, and real-time delivery logs. SuprSend also offers
  a Management API for programmatic control of workflows and templates, a CLI for asset
  synchronization, and an MCP server enabling AI agents to interact with notification
  infrastructure through tool calling.
type: Index
